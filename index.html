<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenAlpha Studio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Montserrat&family=Roboto&family=Oswald&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  font-size:20px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
  width:300px;
  padding:15px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  border-right:1px solid #1e293b;
  overflow:auto;
}

/* MOBILE FIX */
@media(max-width:768px){
  .container{
    flex-direction:column;
  }
  .sidebar{
    width:100%;
    border-right:none;
    border-bottom:1px solid #1e293b;
  }
}

/* TEXTAREA */
textarea{
  width:100%;
  height:150px;
  border-radius:10px;
  padding:10px;
  border:none;
  margin-bottom:10px;
}

/* BUTTONS */
button,select{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

button{
  background:linear-gradient(45deg,#22c55e,#4ade80);
}

/* SLIDES AREA */
#slidesContainer{
  flex:1;
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:15px;
  overflow:auto;
}

/* CARD */
.slideBox{
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  padding:10px;
  transition:0.3s;
  border:2px solid transparent;
}

.slideBox:hover{
  transform:scale(1.03);
}

.slideBox.selected{
  border:2px solid #22c55e;
}

canvas{
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>🚀 GenAlpha Studio (Fixed Premium)</header>

<div class="container">

<div class="sidebar">

<textarea id="htmlInput" placeholder="Paste HTML here..."></textarea>

<input type="file" id="fileInput">

<select id="fontSelector">
<option value="">Default</option>
<option value="Poppins">Poppins</option>
<option value="Montserrat">Montserrat</option>
<option value="Roboto">Roboto</option>
<option value="Oswald">Oswald</option>
</select>

<br>

<button onclick="loadSlides()">Preview</button>
<button onclick="downloadSelected()">Selected</button>
<button onclick="downloadAll()">All</button>
<button onclick="downloadZip()">ZIP</button>
<button onclick="clearAll()">Clear</button>

</div>

<div id="slidesContainer"></div>

</div>

<script>
let canvases=[];
let currentFont="";

document.getElementById("fontSelector").addEventListener("change",()=>{
  currentFont=document.getElementById("fontSelector").value;
  loadSlides();
});

/* FILE LOAD */
document.getElementById("fileInput").addEventListener("change",(e)=>{
  const file=e.target.files[0];
  const reader=new FileReader();
  reader.onload=(e)=>{
    document.getElementById("htmlInput").value=e.target.result;
  };
  reader.readAsText(file);
});

/* MAIN */
async function loadSlides(){
  const container=document.getElementById("slidesContainer");
  container.innerHTML="⏳ Loading...";
  canvases=[];

  const html=document.getElementById("htmlInput").value;
  if(!html) return alert("Paste HTML first");

  const iframe=document.createElement("iframe");
  iframe.style.position="absolute";
  iframe.style.left="-9999px";
  document.body.appendChild(iframe);

  iframe.contentDocument.open();
  iframe.contentDocument.write(html);
  iframe.contentDocument.close();

  await new Promise(r=>setTimeout(r,2500));

  const slides=iframe.contentDocument.querySelectorAll(".slide");

  if(slides.length===0){
    container.innerHTML="❌ No .slide found";
    return;
  }

  container.innerHTML="";

  for(let i=0;i<slides.length;i++){

    if(currentFont){
      slides[i].querySelectorAll("*").forEach(el=>{
        el.style.fontFamily=currentFont;
      });
    }

    try{
      const canvas=await html2canvas(slides[i],{
        scale:3,
        useCORS:true,
        width:1080,
        height:1350
      });

      const box=document.createElement("div");
      box.className="slideBox";

      const check=document.createElement("input");
      check.type="checkbox";

      check.onclick=()=>{
        box.classList.toggle("selected");
      };

      box.appendChild(check);
      box.appendChild(canvas);

      container.appendChild(box);

      canvases.push({canvas,check});
    }
    catch{
      const err=document.createElement("div");
      err.innerText="❌ Slide "+(i+1)+" failed";
      container.appendChild(err);
    }
  }

  iframe.remove();
}

/* DOWNLOAD */
function downloadCanvas(canvas,name){
  const a=document.createElement("a");
  a.download=name;
  a.href=canvas.toDataURL("image/png");
  a.click();
}

function downloadSelected(){
  canvases.forEach((item,i)=>{
    if(item.check.checked){
      downloadCanvas(item.canvas,"slide_"+(i+1)+".png");
    }
  });
}

function downloadAll(){
  canvases.forEach((item,i)=>{
    downloadCanvas(item.canvas,"slide_"+(i+1)+".png");
  });
}

function downloadZip(){
  const zip=new JSZip();

  canvases.forEach((item,i)=>{
    const img=item.canvas.toDataURL().split(",")[1];
    zip.file("slide_"+(i+1)+".png",img,{base64:true});
  });

  zip.generateAsync({type:"blob"}).then(content=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(content);
    a.download="slides.zip";
    a.click();
  });
}

function clearAll(){
  document.getElementById("htmlInput").value="";
  document.getElementById("slidesContainer").innerHTML="";
}
</script>

</body>
</html>
