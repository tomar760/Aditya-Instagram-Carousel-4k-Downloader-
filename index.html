<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenAlpha Studio Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Montserrat&family=Roboto&display=swap" rel="stylesheet">
</head>

<body>

<header>
  🚀 GenAlpha Studio PRO
</header>

<div class="container">

<!-- LEFT PANEL -->
<div class="panel">

<textarea id="htmlInput" placeholder="Paste HTML OR Drag File..."></textarea>

<input type="file" id="fileInput">

<select id="fontSelector">
<option value="">Default</option>
<option value="Poppins">Poppins</option>
<option value="Montserrat">Montserrat</option>
<option value="Roboto">Roboto</option>
</select>

<div class="buttons">
<button onclick="loadSlides()">Preview</button>
<button onclick="downloadSelected()">Selected</button>
<button onclick="downloadAll()">All</button>
<button onclick="downloadZip()">ZIP</button>
<button onclick="clearAll()">Clear</button>
</div>

</div>

<!-- RIGHT PANEL -->
<div id="slidesContainer"></div>

</div>

<script src="script.js"></script>
</body>
</html>
