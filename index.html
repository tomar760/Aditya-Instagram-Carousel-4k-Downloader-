<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenAlpha Carousel Pro</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:#fff;
  padding:20px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.container{
  max-width:1000px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(10px);
}

textarea{
  width:100%;
  height:120px;
  border-radius:10px;
  border:none;
  padding:10px;
  margin-bottom:15px;
}

.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
}

.primary{background:#00e0ff;color:#000}
.secondary{background:#333;color:#fff}
.danger{background:#ff4d4d;color:#fff}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
  margin-top:20px;
}

.card{
  background:#000;
  padding:6px;
  border-radius:10px;
  position:relative;
  transition:0.3s;
}
.card:hover{transform:scale(1.05)}

.card img{
  width:100%;
  border-radius:10px;
}

.card input{
  position:absolute;
  top:5px;
  left:5px;
  transform:scale(1.2);
}

.status{
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<h1>🚀 Carousel Pro Tool</h1>

<div class="container">
<textarea id="htmlInput" placeholder="Paste HTML (with .slide class)..."></textarea>

<div class="buttons">
<button class="secondary" onclick="preview()">Preview</button>
<button class="primary" onclick="generate()">Generate</button>
<button class="primary" onclick="downloadSelected()">Selected</button>
<button class="primary" onclick="downloadAll()">All</button>
<button class="primary" onclick="downloadZip()">ZIP</button>
<button class="danger" onclick="clearAll()">Clear</button>
</div>

<div id="status" class="status"></div>
<div id="slides" class="grid"></div>
</div>

<script>

let images = [];
let iframe;

function setStatus(msg){
  document.getElementById("status").innerText = msg;
}

function preview(){
  iframe = document.createElement("iframe");
  iframe.style.display = "none";
  document.body.appendChild(iframe);

  iframe.srcdoc = document.getElementById("htmlInput").value;

  iframe.onload = () => {
    setStatus("✅ Preview Loaded");
  };
}

async function generate(){
  try{
    if(!iframe) return setStatus("⚠️ Click Preview first");

    let doc = iframe.contentDocument;
    let slides = doc.querySelectorAll(".slide");

    if(slides.length === 0){
      return setStatus("❌ No .slide found");
    }

    images = [];
    let container = document.getElementById("slides");
    container.innerHTML = "";

    for(let i=0;i<slides.length;i++){
      setStatus(`Processing ${i+1}/${slides.length}`);

      let canvas = await html2canvas(slides[i], {scale:2});
      let img = canvas.toDataURL();

      images.push(img);

      let div = document.createElement("div");
      div.className="card";
      div.innerHTML = `
        <input type="checkbox" checked value="${i}">
        <img src="${img}">
      `;

      container.appendChild(div);
    }

    setStatus("🔥 Slides Ready");

  }catch(e){
    setStatus("❌ Error generating slides");
  }
}

function getSelected(){
  let checks = document.querySelectorAll("input[type=checkbox]");
  let arr = [];
  checks.forEach(c=>{
    if(c.checked) arr.push(c.value);
  });
  return arr;
}

function downloadSelected(){
  let sel = getSelected();
  if(sel.length === 0) return setStatus("⚠️ Select slides");

  sel.forEach(i=>{
    let a = document.createElement("a");
    a.href = images[i];
    a.download = `slide-${parseInt(i)+1}.png`;
    a.click();
  });

  setStatus("⬇️ Selected Downloaded");
}

function downloadAll(){
  images.forEach((img,i)=>{
    let a = document.createElement("a");
    a.href = img;
    a.download = `slide-${i+1}.png`;
    a.click();
  });

  setStatus("⬇️ All Downloaded");
}

async function downloadZip(){
  let zip = new JSZip();

  images.forEach((img,i)=>{
    zip.file(`slide-${i+1}.png`, img.split(',')[1], {base64:true});
  });

  let content = await zip.generateAsync({type:"blob"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(content);
  a.download = "slides.zip";
  a.click();

  setStatus("📦 ZIP Ready");
}

function clearAll(){
  document.getElementById("htmlInput").value="";
  document.getElementById("slides").innerHTML="";
  images=[];
  setStatus("Cleared ✅");
}

</script>

</body>
</html>
