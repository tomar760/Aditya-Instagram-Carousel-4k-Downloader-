<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GenAlpha Studio PRO</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Montserrat:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  margin:0;
  font-family:Poppins;
  background:#0b0f1a;
  color:white;
}

.container {
  display:flex;
  flex-direction:column;
  padding:15px;
}

.controls {
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
}

textarea {
  width:100%;
  height:120px;
  background:#000;
  color:#0f0;
  border:none;
  padding:10px;
  border-radius:8px;
}

select, button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

button {
  background:#22c55e;
  color:black;
  cursor:pointer;
}

.slides {
  display:flex;
  flex-direction:column;
  gap:20px;
}

.slide {
  width:100%;
  max-width:400px;
  aspect-ratio:4/5;
  background:linear-gradient(135deg,#020617,#0f172a);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h2 {
  margin:0;
  font-size:22px;
}

p {
  font-size:14px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="container">

<div class="controls">
<textarea id="inputText" placeholder="Paste your content here..."></textarea>

<select id="fontSelect">
  <option value="Poppins">Poppins</option>
  <option value="Montserrat">Montserrat</option>
  <option value="Inter">Inter</option>
</select>

<button onclick="generateSlides()">Preview</button>
<button onclick="downloadAll()">Download All</button>
</div>

<div class="slides" id="slides"></div>

</div>

<script>

function generateSlides() {
  const text = document.getElementById("inputText").value;
  const slidesDiv = document.getElementById("slides");
  const font = document.getElementById("fontSelect").value;

  slidesDiv.innerHTML = "";

  const parts = text.split("\n\n");

  parts.forEach((part, i) => {
    const slide = document.createElement("div");
    slide.className = "slide";
    slide.style.fontFamily = font;

    slide.innerHTML = `
      <h2>Slide ${i+1}</h2>
      <p>${part}</p>
    `;

    slidesDiv.appendChild(slide);
  });
}

async function downloadAll() {
  const slides = document.querySelectorAll(".slide");

  for (let i = 0; i < slides.length; i++) {
    const canvas = await html2canvas(slides[i], {
      scale: 3
    });

    const link = document.createElement("a");
    link.download = `slide-${i+1}.png`;
    link.href = canvas.toDataURL();
    link.click();
  }
}

</script>

</body>
</html>
