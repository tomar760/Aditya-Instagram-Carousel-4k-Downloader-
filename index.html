<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenAlpha Pro Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Montserrat&family=Roboto&family=Oswald&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

/* MAIN CARD */
.card{
  width:90%;
  max-width:900px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 30px rgba(0,0,0,0.4);
}

/* TEXTAREA */
textarea{
  width:100%;
  height:180px;
  border-radius:12px;
  padding:12px;
  border:none;
  outline:none;
  font-size:14px;
  margin-bottom:10px;
}

/* CONTROLS */
.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-bottom:15px;
}

button, select{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* BUTTON COLORS */
.btn{
  background:#22c55e;
  color:#000;
}
.btn2{
  background:#3b82f6;
}
.btn3{
  background:#f59e0b;
}
.btn4{
  background:#ef4444;
}

/* SLIDES */
#slidesContainer{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-top:20px;
}

.slideBox{
  background:rgba(0,0,0,0.4);
  padding:10px;
  border-radius:15px;
  text-align:center;
}

canvas{
  width:100%;
  border-radius:10px;
}

/* FOOTER */
.footer{
  text-align:center;
  margin:30px;
  opacity:0.6;
}
</style>
</head>

<body>

<div class="header">🚀 GenAlpha Premium Carousel Tool</div>

<div class="card">

<textarea id="htmlInput" placeholder="Paste FULL HTML here..."></textarea>

<div class="controls">

<select id="fontSelector" onchange="applyFontLive()">
<option value="">Original Font</option>
<option value="Poppins">Poppins</option>
<option value="Montserrat">Montserrat</option>
<option value="Roboto">Roboto</option>
<option value="Oswald">Oswald</option>
</select>

<button class="btn" onclick="loadSlides()">Preview</button>
<button class="btn2" onclick="downloadSelected()">Selected</button>
<button class="btn2" onclick="downloadAll()">All</button>
<button class="btn3" onclick="downloadZip()">ZIP</button>
<button class="btn4" onclick="clearAll()">Clear</button>

</div>

<div id="slidesContainer"></div>

</div>

<div class="footer">Made by Aditya Tomar | @genalpha.in</div>

<script>
let canvases = [];
let currentFont = "";

function applyFontLive(){
  currentFont = document.getElementById("fontSelector").value;
  loadSlides();
}

async function loadSlides(){
  const container = document.getElementById("slidesContainer");
  container.innerHTML = "⏳ Rendering Slides...";
  canvases = [];

  let html = document.getElementById("htmlInput").value;

  if(!html){
    alert("Paste HTML first");
    return;
  }

  const iframe = document.createElement("iframe");
  iframe.style.position="absolute";
  iframe.style.left="-9999px";
  document.body.appendChild(iframe);

  iframe.contentDocument.open();
  iframe.contentDocument.write(html);
  iframe.contentDocument.close();

  await new Promise(r=>setTimeout(r,2500));

  const slides = iframe.contentDocument.querySelectorAll(".slide");

  if(slides.length===0){
    container.innerHTML="❌ No .slide found in HTML";
    return;
  }

  container.innerHTML="";

  for(let i=0;i<slides.length;i++){
    try{

      if(currentFont){
        slides[i].querySelectorAll("*").forEach(el=>{
          el.style.fontFamily = currentFont + ", sans-serif";
        });
      }

      const canvas = await html2canvas(slides[i],{
        scale:4,
        useCORS:true,
        width:1080,
        height:1350
      });

      const box = document.createElement("div");
      box.className="slideBox";

      const check = document.createElement("input");
      check.type="checkbox";

      box.appendChild(check);
      box.appendChild(document.createElement("br"));
      box.appendChild(canvas);

      container.appendChild(box);

      canvases.push({canvas,check});
    }
    catch(e){
      const err=document.createElement("div");
      err.innerText="❌ Slide "+(i+1)+" failed (Network/Font issue)";
      container.appendChild(err);
    }
  }

  iframe.remove();
}

function downloadCanvas(canvas,name){
  const link=document.createElement("a");
  link.download=name;
  link.href=canvas.toDataURL("image/png");
  link.click();
}

function downloadSelected(){
  let found=false;
  canvases.forEach((item,i)=>{
    if(item.check.checked){
      downloadCanvas(item.canvas,"slide_"+(i+1)+".png");
      found=true;
    }
  });
  if(!found) alert("Select slides first");
}

function downloadAll(){
  canvases.forEach((item,i)=>{
    downloadCanvas(item.canvas,"slide_"+(i+1)+".png");
  });
}

function downloadZip(){
  const zip=new JSZip();

  canvases.forEach((item,i)=>{
    const img=item.canvas.toDataURL().split(",")[1];
    zip.file("slide_"+(i+1)+".png",img,{base64:true});
  });

  zip.generateAsync({type:"blob"}).then(content=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(content);
    a.download="slides.zip";
    a.click();
  });
}

function clearAll(){
  document.getElementById("htmlInput").value="";
  document.getElementById("slidesContainer").innerHTML="";
  canvases=[];
}
</script>

</body>
</html>
