<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAlpha Premium | 4K Carousel Studio</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Bebas+Neue&family=Montserrat:wght@700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --accent: #00f2ff;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 400px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-right: 1px solid var(--border);
            padding: 30px;
            height: 100vh;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 20px 0 50px rgba(0,0,0,0.3);
        }

        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area h1 { font-weight: 800; font-size: 28px; letter-spacing: -1px; background: linear-gradient(to right, var(--accent), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 12px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }

        textarea {
            width: 100%; height: 180px;
            background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            border-radius: 12px; color: #a5f3fc; padding: 12px;
            font-family: 'Courier New', monospace; font-size: 12px; resize: none;
            transition: 0.3s;
        }
        textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }

        select, input[type="text"], input[type="color"] {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4);
            border: 1px solid var(--border); border-radius: 8px; color: white; outline: none;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        
        .main-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 700; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;
        }
        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4); }

        .sub-btn {
            padding: 10px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--glass); color: white; cursor: pointer; transition: 0.2s; font-size: 13px;
        }
        .sub-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

        /* Preview Area */
        .preview-pane {
            flex: 1; padding: 40px; overflow-y: auto;
            display: flex; flex-direction: column; align-items: center;
            scroll-behavior: smooth;
        }

        .slides-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px; width: 100%; max-width: 1200px;
        }

        .slide-wrapper {
            background: var(--glass); border: 1px solid var(--border);
            padding: 15px; border-radius: 24px; position: relative;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .slide-wrapper:hover { transform: translateY(-10px) scale(1.02); border-color: var(--accent); }

        canvas { width: 100%; border-radius: 15px; display: block; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }

        .slide-meta {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 12px; padding: 0 5px;
        }
        .slide-check { width: 20px; height: 20px; accent-color: var(--accent); }

        /* Loader */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .spinner {
            width: 60px; height: 60px; border: 5px solid var(--glass);
            border-top: 5px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Empty State */
        .empty-state { text-align: center; margin-top: 150px; opacity: 0.3; }
        .empty-state i { font-size: 80px; display: block; margin-bottom: 10px; }

        /* Mobile Adjustments */
        @media (max-width: 1000px) {
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .preview-pane { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <h2 id="loadText">Processing 4K Resolution...</h2>
    </div>

    <aside class="sidebar">
        <div class="logo-area">
            <h1>GenAlpha Studio</h1>
            <p style="font-size: 10px; color: #888; letter-spacing: 2px;">PREMIUM CAROUSEL TOOL</p>
        </div>

        <div class="control-group">
            <label>1. Paste Claude HTML</label>
            <textarea id="htmlInput" placeholder="<html>...</html>"></textarea>
        </div>

        <div class="control-group">
            <label>2. Customize Style</label>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <select id="fontSelect" onchange="updateLivePreview()">
                    <option value="'Poppins', sans-serif">Poppins (Modern)</option>
                    <option value="'Montserrat', sans-serif">Montserrat (Bold)</option>
                    <option value="'Bebas Neue', cursive">Bebas Neue (Impact)</option>
                    <option value="'Playfair Display', serif">Playfair (Elegant)</option>
                </select>
                <input type="color" id="bgColor" value="#0f172a" title="Override Background">
            </div>
            <input type="text" id="watermark" placeholder="Add Instagram Handle (e.g. @genalpha.in)">
        </div>

        <button class="main-btn" onclick="generateCarousels()">✨ Build Carousel</button>
        
        <div class="btn-grid">
            <button class="sub-btn" onclick="clearAll()">🗑️ Clear</button>
            <button class="sub-btn" onclick="downloadZip()">📦 Get ZIP</button>
        </div>

        <div class="control-group" style="margin-top: 30px;">
            <label>Download Selected</label>
            <button class="sub-btn" style="width: 100%;" onclick="downloadSelected()">📥 Download All (PNG)</button>
        </div>

        <footer style="margin-top: 40px; font-size: 11px; text-align: center; opacity: 0.5;">
            Developed by <b>Aditya Tomar</b><br>v2.0 Premium Access
        </footer>
    </aside>

    <main class="preview-pane">
        <div id="slidesContainer" class="slides-container">
            <div class="empty-state">
                <i>🎨</i>
                <p>Your creative masterpiece will appear here.</p>
            </div>
        </div>
    </main>

    <script>
        let canvases = [];

        async function generateCarousels() {
            const html = document.getElementById("htmlInput").value;
            if (!html) return alert("Please paste HTML first!");

            const loader = document.getElementById("loader");
            const container = document.getElementById("slidesContainer");
            const font = document.getElementById("fontSelect").value;
            const bg = document.getElementById("bgColor").value;
            const handle = document.getElementById("watermark").value;

            loader.style.display = "flex";
            container.innerHTML = "";
            canvases = [];

            // Shadow Rendering Iframe
            const iframe = document.createElement("iframe");
            iframe.style.position = "absolute";
            iframe.style.left = "-9999px";
            iframe.style.width = "1080px"; 
            document.body.appendChild(iframe);

            const doc = iframe.contentDocument;
            doc.open();
            doc.write(`
                <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&family=Bebas+Neue&family=Montserrat:wght@700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
                <style>
                    * { font-family: ${font} !important; box-sizing: border-box; }
                    body { background: ${bg}; margin: 0; }
                    .slide { 
                        width: 1080px !important; 
                        height: 1350px !important; 
                        position: relative; 
                        overflow: hidden; 
                        display: flex; 
                        flex-direction: column;
                    }
                    .watermark-tag {
                        position: absolute; bottom: 40px; right: 40px;
                        font-size: 24px; opacity: 0.6; color: inherit;
                        font-family: 'Poppins', sans-serif !important;
                    }
                </style>
                ${html}
            `);
            doc.close();

            // Wait for assets
            await new Promise(r => setTimeout(r, 2500));

            const slides = doc.querySelectorAll(".slide");
            if (slides.length === 0) {
                alert("No .slide class found in your HTML!");
                loader.style.display = "none";
                return;
            }

            for (let i = 0; i < slides.length; i++) {
                // Add watermark if provided
                if (handle) {
                    const tag = doc.createElement("div");
                    tag.className = "watermark-tag";
                    tag.innerText = handle;
                    slides[i].appendChild(tag);
                }

                try {
                    const canvas = await html2canvas(slides[i], {
                        scale: 2, // High DPI
                        useCORS: true,
                        allowTaint: true,
                        width: 1080,
                        height: 1350,
                        backgroundColor: bg
                    });

                    const wrapper = document.createElement("div");
                    wrapper.className = "slide-wrapper";

                    const meta = document.createElement("div");
                    meta.className = "slide-meta";
                    meta.innerHTML = `<span>Slide ${i+1}</span><input type="checkbox" class="slide-check" checked>`;

                    wrapper.appendChild(canvas);
                    wrapper.appendChild(meta);
                    container.appendChild(wrapper);

                    // GSAP Animation
                    gsap.from(wrapper, { opacity: 0, scale: 0.8, y: 50, duration: 0.6, delay: i * 0.15 });

                    canvases.push({ canvas, check: meta.querySelector('input') });
                } catch (err) {
                    console.error("Error rendering slide", i, err);
                }
            }

            loader.style.display = "none";
            iframe.remove();
        }

        function downloadSelected() {
            canvases.forEach((item, i) => {
                if (item.check.checked) {
                    const link = document.createElement("a");
                    link.download = `Slide_${i + 1}_GenAlpha.png`;
                    link.href = item.canvas.toDataURL("image/png", 1.0);
                    link.click();
                }
            });
        }

        function downloadZip() {
            const zip = new JSZip();
            let count = 0;
            canvases.forEach((item, i) => {
                if (item.check.checked) {
                    const imgData = item.canvas.toDataURL("image/png").split(",")[1];
                    zip.file(`Slide_${i + 1}.png`, imgData, { base64: true });
                    count++;
                }
            });

            if (count === 0) return alert("Select slides first!");

            zip.generateAsync({ type: "blob" }).then(content => {
                const a = document.createElement("a");
                a.href = URL.createObjectURL(content);
                a.download = "Carousel_Pack_GenAlpha.zip";
                a.click();
            });
        }

        function clearAll() {
            document.getElementById("htmlInput").value = "";
            document.getElementById("slidesContainer").innerHTML = `
                <div class="empty-state">
                    <i>🎨</i>
                    <p>Your creative masterpiece will appear here.</p>
                </div>
            `;
            canvases = [];
        }

        function updateLivePreview() {
            // Optional: Auto-re-render when font changes if user wants
            console.log("Font changed to:", document.getElementById("fontSelect").value);
        }
    </script>
</body>
</html>
