<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenAlpha Carousel Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  text-align:center;
}

h1{
  margin:20px;
}

textarea{
  width:90%;
  height:150px;
  border-radius:10px;
  padding:10px;
}

button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#22c55e;
  color:#000;
  font-weight:bold;
}

#slidesContainer{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  margin-top:20px;
}

.slideBox{
  background:#111;
  padding:10px;
  border-radius:10px;
}

canvas{
  width:300px;
  border-radius:10px;
}

.footer{
  margin-top:40px;
  opacity:0.6;
}
</style>
</head>

<body>

<h1>🔥 GenAlpha Carousel Downloader</h1>

<textarea id="htmlInput" placeholder="Paste your HTML code here..."></textarea><br>

<button onclick="loadSlides()">Preview</button>
<button onclick="downloadSelected()">Download Selected</button>
<button onclick="downloadAll()">Download All</button>
<button onclick="downloadZip()">Download ZIP</button>
<button onclick="clearAll()">Clear</button>

<div id="slidesContainer"></div>

<div class="footer">
Made by Aditya Tomar | @genalpha.in
</div>

<script>
let canvases = [];

async function loadSlides(){
  const container = document.getElementById("slidesContainer");
  container.innerHTML = "⏳ Loading...";
  canvases = [];

  const html = document.getElementById("htmlInput").value;
  if(!html){
    alert("Paste HTML first");
    return;
  }

  const iframe = document.createElement("iframe");
  iframe.style.position="absolute";
  iframe.style.left="-9999px";
  document.body.appendChild(iframe);

  iframe.contentDocument.open();
  iframe.contentDocument.write(html);
  iframe.contentDocument.close();

  await new Promise(r=>setTimeout(r,2000));

  const slides = iframe.contentDocument.querySelectorAll(".slide");

  if(slides.length===0){
    container.innerHTML="❌ No slides found (.slide missing)";
    return;
  }

  container.innerHTML="";

  for(let i=0;i<slides.length;i++){
    try{
      const canvas = await html2canvas(slides[i],{
        scale:4,
        useCORS:true
      });

      const box = document.createElement("div");
      box.className="slideBox";

      const check = document.createElement("input");
      check.type="checkbox";

      box.appendChild(check);
      box.appendChild(document.createElement("br"));
      box.appendChild(canvas);

      container.appendChild(box);

      canvases.push({canvas,check});
    }
    catch(e){
      const err=document.createElement("div");
      err.innerText="❌ Slide "+(i+1)+" failed";
      container.appendChild(err);
    }
  }

  iframe.remove();
}

function downloadCanvas(canvas,name){
  const link=document.createElement("a");
  link.download=name;
  link.href=canvas.toDataURL("image/png");
  link.click();
}

function downloadSelected(){
  let found=false;
  canvases.forEach((item,i)=>{
    if(item.check.checked){
      downloadCanvas(item.canvas,"slide_"+(i+1)+".png");
      found=true;
    }
  });
  if(!found) alert("Select slides first");
}

function downloadAll(){
  canvases.forEach((item,i)=>{
    downloadCanvas(item.canvas,"slide_"+(i+1)+".png");
  });
}

function downloadZip(){
  const zip=new JSZip();

  canvases.forEach((item,i)=>{
    const img=item.canvas.toDataURL().split(",")[1];
    zip.file("slide_"+(i+1)+".png",img,{base64:true});
  });

  zip.generateAsync({type:"blob"}).then(content=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(content);
    a.download="slides.zip";
    a.click();
  });
}

function clearAll(){
  document.getElementById("htmlInput").value="";
  document.getElementById("slidesContainer").innerHTML="";
  canvases=[];
}
</script>

</body>
</html>
